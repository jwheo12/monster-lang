name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LLVM 18 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 llvm-18-tools

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          clang-18 --version
          opt-18 --version

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

      - name: Smoke test LLVM backend
        run: |
          cargo run --locked -- check exam.mnst
          cargo run --locked -- emit-llvm exam.mnst > /tmp/exam.ll
          cargo run --locked -- run exam.mnst
          cargo run --locked -- check examples/argv.mnst
          cargo run --locked -- run examples/argv.mnst -- hello
          cargo run --locked -- check examples/enum.mnst
          cargo run --locked -- run examples/enum.mnst
          cargo run --locked -- check examples/file_io.mnst
          cargo run --locked -- run examples/file_io.mnst -- exam.mnst
          cargo run --locked -- check examples/imports/main.mnst
          cargo run --locked -- emit-llvm examples/imports/main.mnst > /tmp/imports.ll
          cargo run --locked -- run examples/imports/main.mnst
          cargo run --locked -- check std/mem.mnst
          cargo run --locked -- check std/str.mnst
          cargo run --locked -- check std/vec_i32.mnst
          cargo run --locked -- check examples/string_bytes.mnst
          cargo run --locked -- run examples/string_bytes.mnst
          cargo run --locked -- check examples/growable_vec_i32.mnst
          cargo run --locked -- emit-llvm examples/growable_vec_i32.mnst > /tmp/growable_vec_i32.ll
          cargo run --locked -- run examples/growable_vec_i32.mnst
          cargo run --locked -- check selfhost/main.mnst
          cargo run --locked -- run selfhost/main.mnst -- exam.mnst
