name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x86_64
            archive_ext: tar.gz
            binary_name: mst
          - runs_on: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            asset_os: linux
            asset_arch: aarch64
            archive_ext: tar.gz
            binary_name: mst
          - runs_on: macos-15-intel
            target: x86_64-apple-darwin
            asset_os: darwin
            asset_arch: x86_64
            archive_ext: tar.gz
            binary_name: mst
          - runs_on: macos-15
            target: aarch64-apple-darwin
            asset_os: darwin
            asset_arch: aarch64
            archive_ext: tar.gz
            binary_name: mst
          - runs_on: windows-2025
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x86_64
            archive_ext: zip
            binary_name: mst.exe

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix asset
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ASSET_OS: ${{ matrix.asset_os }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          package="mst-${VERSION}-${ASSET_OS}-${ASSET_ARCH}"
          if [[ "$ASSET_OS" == "linux" ]]; then
            package="${package}-gnu"
          fi

          stage="$RUNNER_TEMP/$package"
          mkdir -p "$stage"
          cp "target/$TARGET/release/mst" "$stage/"
          cp README.md LICENSE "$stage/"
          cp -R std "$stage/"

          archive="$RUNNER_TEMP/${package}.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$archive" "$package"
          (
            cd "$RUNNER_TEMP"
            shasum -a 256 "$(basename "$archive")" > "$(basename "$archive").sha256"
          )

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $Package = "mst-$env:VERSION-windows-x86_64"
          $Stage = Join-Path $env:RUNNER_TEMP $Package
          New-Item -ItemType Directory -Force -Path $Stage | Out-Null

          Copy-Item "target\$env:TARGET\release\mst.exe" -Destination $Stage
          Copy-Item README.md -Destination $Stage
          Copy-Item LICENSE -Destination $Stage
          Copy-Item std -Destination $Stage -Recurse

          $Archive = Join-Path $env:RUNNER_TEMP "$Package.zip"
          Compress-Archive -Path $Stage -DestinationPath $Archive -Force

          $Hash = (Get-FileHash -Path $Archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$Hash  $(Split-Path -Leaf $Archive)" | Set-Content -Path "$Archive.sha256" -NoNewline

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: |
            ${{ runner.temp }}/mst-*-${{ matrix.asset_os }}-${{ matrix.asset_arch }}*.${{ matrix.archive_ext }}
            ${{ runner.temp }}/mst-*-${{ matrix.asset_os }}-${{ matrix.asset_arch }}*.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-24.04
    needs: build-release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "$TAG_NAME" == *"-rc"* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            "${prerelease_flag[@]}" \
            "${files[@]}"
